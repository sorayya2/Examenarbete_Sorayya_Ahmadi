<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Product Catalog</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #e6e0d8, #f3efe9);
}

/* HEADER */
header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background: linear-gradient(135deg, #1e1e1e, #3a3a3a);
    color: #f5f5f5;
    padding: 20px 30px;
    font-size: 24px;
    font-weight: bold;
}

/* LOGIN */
#loginPage {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box {
    background:#fdfaf6;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

/* CONTAINER */
.container {
    width: 85%;
    margin: 30px auto;
}

/* CARDS */
.card {
    background: #fdfaf6;
    padding: 25px;
    border-radius: 16px;
    margin-bottom: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
}

/* INPUTS */
input {
    padding: 12px;
    margin-right: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    width: 200px;
    background: #f7f3ee;
}

/* BUTTONS */
button {
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

/* COLORS */
.save {
    background: #333;
    color: white;
}

.edit {
    background: orange;
    color: white;
}

.delete {
    background: red;
    color: white;
}

/* PRODUCT */
.product {
    display: flex;
    justify-content: space-between;
    background: #f7f3ee;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="login-box">
        <h2>🔐 Login</h2>
        <input id="username" placeholder="Username"><br><br>
        <input id="password" type="password" placeholder="Password"><br><br>
        <button class="save" onclick="login()">Login</button>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
    <div>📦 Product Catalog</div>
    <button onclick="logout()" class="delete">Logout</button>
</header>

<div class="container">

<div class="card">
<h2 id="title">Add Product</h2>

<form id="form">
<input id="name" placeholder="Name" required>
<input id="price" placeholder="Price" type="number" required>
<button class="save">Save</button>
</form>
</div>

<div class="card">
<h2>Products</h2>

<input id="search" placeholder="Search..." onkeyup="filter()">

<div id="list"></div>
</div>

</div>
</div>

<script>

let editId = null;

/* LOGIN */
function login() {
    let u = document.getElementById('username').value;
    let p = document.getElementById('password').value;

    if(u === "admin" && p === "1234"){
        document.getElementById('loginPage').style.display = "none";
        document.getElementById('app').style.display = "block";
        load();
    } else {
        alert("Wrong login!");
    }
}

/* LOGOUT */
function logout(){
    document.getElementById('app').style.display = "none";
    document.getElementById('loginPage').style.display = "flex";

    document.getElementById('username').value = "";
    document.getElementById('password').value = "";
}

/* LOAD */
async function load(){
    let res = await fetch('/products');
    let data = await res.json();

    let list = document.getElementById('list');
    list.innerHTML='';

    data.forEach(p=>{
        let div=document.createElement('div');
        div.className='product';

        div.innerHTML=`
            <span>${p.name} - ${p.price} kr</span>
            <div>
                <button class="edit" onclick="edit(${p.id},'${p.name}',${p.price})">Edit</button>
                <button class="delete" onclick="del(${p.id})">Delete</button>
            </div>
        `;
        list.appendChild(div);
    });
}

/* SAVE */
document.getElementById('form').onsubmit=async e=>{
    e.preventDefault();

    let product={
        name:document.getElementById('name').value,
        price:document.getElementById('price').value
    };

    if(editId){
        await fetch('/products/'+editId,{
            method:'PUT',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(product)
        });
        editId=null;
        document.getElementById('title').innerText="Add Product";
    }else{
        await fetch('/products',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(product)
        });
    }

    document.getElementById('name').value='';
    document.getElementById('price').value='';
    load();
};

/* EDIT */
function edit(id,name,price){
    editId=id;
    document.getElementById('name').value=name;
    document.getElementById('price').value=price;
    document.getElementById('title').innerText="Edit Product";
}

/* DELETE */
async function del(id){
    await fetch('/products/'+id,{method:'DELETE'});
    load();
}

/* SEARCH */
function filter(){
    let val=document.getElementById('search').value.toLowerCase();
    document.querySelectorAll('.product').forEach(p=>{
        p.style.display=p.innerText.toLowerCase().includes(val)?'':'none';
    });
}

</script>

</body>
</html>
